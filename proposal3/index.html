<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proposal 3 — Gwinn Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .badge {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #33ff66, #33ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 24px;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 16px;
    }
    p { color: #8888aa; font-size: 1.1rem; margin-bottom: 40px; }
    a {
      color: #8888aa;
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      transition: color 0.3s;
    }
    a:hover { color: #f0f0f5; }
    .glow {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(51,255,102,0.1), transparent 70%);
      filter: blur(80px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <p class="badge">proposal3.gwinndigital.com</p>
  <h1>Coming Soon</h1>
  <p>This proposal is being prepared for you.</p>
  <a href="https://gwinndigital.com">&larr; Gwinn Digital</a>
</body>
</html>
